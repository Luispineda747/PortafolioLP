<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS para diseño y maquetación de alto nivel -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts (Playfair Display para títulos serif elegantes, Inter para textos de alta legibilidad) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Playfair+Display:ital,wght=0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            midnight: {
              DEFAULT: '#0F2027',
              darker: '#0a1419',
              lighter: '#203A43',
              deep: '#14272E',
            },
            electricCyan: '#00E5FF',
            brightCyan: '#00B0FF',
            iceBlue: '#F5F7FA',
            grayText: '#E0E6ED'
          }
        }
      }

  <style>
    /* Efecto Glassmorphism (vidrio esmerilado translúcido) */
    .glass-card {
      background: rgba(15, 32, 39, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 229, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    .glass-card-hover:hover {
      border: 1px solid rgba(0, 229, 255, 0.4);
      background: rgba(15, 32, 39, 0.7);
      box-shadow: 0 8px 32px 0 rgba(0, 229, 255, 0.1);
      transform: translateY(-2px);
      transition: all 0.3s ease;
    }
    .bg-gradient-midnight {
      background: linear-gradient(135deg, #0F2027 0%, #203A43 50%, #2C5364 100%);
    }
    /* Animación de transición suave para las diapositivas */
    .slide-fade-in {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    /* Desactivación de barras de desplazamiento */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-950 text-white font-sans antialiased selection:bg-cyan-500 selection:text-black">

  <div class="min-h-screen bg-slate-950 flex flex-col xl:flex-row overflow-hidden">

      </div>

      <div class="border-t border-slate-800 pt-6 mt-6">

          >

          <button 
            id="btn-next"

        <!-- CONTENIDO DINÁMICO DE LA DIAPOSITIVA (Inyectado por JS) -->
        <div id="slide-content" class="flex-1 flex flex-col justify-between slide-fade-in">
          <!-- Aquí se renderiza la diapositiva actual -->
        </div>

          <span>PORTAFOLIO DE SERVICIOS</span>

      </div>

    </main>

          }">${slide.num}</span>
        </button>
      `).join('');

      const progressContainer = document.getElementById('progress-bar-container');
      progressContainer.innerHTML = slidesInfo.map((slide, idx) => `
        <button
          onclick="goToSlide(${idx})"
          class="h-2 rounded transition-all ${
            currentSlide === idx ? 'bg-cyan-400 w-full' : 'bg-slate-800 hover:bg-slate-700 w-full'
          }"
          title="${slide.title}"
        ></button>
      `).join('');
    }

    function nextSlide() {
      if (currentSlide < totalSlides - 1) {
        currentSlide++;
        render();
      }
    }

    function prevSlide() {
      if (currentSlide > 0) {
        currentSlide--;
        render();
      }
    }

    function goToSlide(index) {
      currentSlide = index;
      render();
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        prevSlide();
      }
    });

    let touchStartX = 0;
    let touchEndX = 0;
    const slideViewport = document.getElementById('slide-viewport');

    slideViewport.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, false);

    slideViewport.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, false);

    function handleSwipe() {
      const swipeDistance = touchEndX - touchStartX;
      if (swipeDistance < -50) {
        nextSlide();
      } else if (swipeDistance > 50) {
        prevSlide();
      }
    }

    window.onload = function() {
      render();
    }
